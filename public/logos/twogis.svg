<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="rnd">
      <rect width="100" height="100" rx="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rnd)">
    <!-- Yellow/orange background -->
    <rect width="100" height="100" fill="#F9A01B"/>
    <!-- Dark green diagonal section -->
    <polygon points="0,36 100,4 100,100 0,100" fill="#1CA14B"/>
    <!-- Light green bottom-right accent -->
    <polygon points="26,100 100,62 100,100" fill="#55C63A"/>
    <!-- White pin shadow/outline -->
    <circle cx="50" cy="46" r="22" fill="white"/>
    <polygon points="41,63 59,63 50,80" fill="white"/>
    <!-- Blue pin fill -->
    <circle cx="50" cy="45" r="17" fill="#1C7CE5"/>
    <polygon points="43,62 57,62 50,76" fill="#1C7CE5"/>
  </g>
</svg>
